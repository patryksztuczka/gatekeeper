name: Backend CI

on:
  pull_request:
    paths:
      - 'apps/backend-hono/**'
      - '.github/workflows/backend.yml'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
  push:
    branches:
      - master
    paths:
      - 'apps/backend-hono/**'
      - '.github/workflows/backend.yml'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate backend types
        run: pnpm --filter backend-hono cf-typegen

      - name: Check formatting
        run: pnpm --filter backend-hono format:check

      - name: Lint backend
        run: pnpm lint

      - name: Check backend types
        run: pnpm --filter backend-hono check-types

      - name: Run backend tests
        run: pnpm --filter backend-hono test

      - name: Build backend
        run: pnpm --filter backend-hono build
