name: Web CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/oxlint-config/**'
      - '.github/workflows/web.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'oxfmt.config.ts'
  push:
    branches:
      - master
    paths:
      - 'apps/web/**'
      - 'packages/oxlint-config/**'
      - '.github/workflows/web.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'oxfmt.config.ts'

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm --filter web format:check

      - name: Lint web
        run: pnpm --filter web lint

      - name: Check web types
        run: pnpm --filter web check-types

      - name: Run web tests
        run: pnpm --filter web test

      - name: Build web
        run: pnpm --filter web build
